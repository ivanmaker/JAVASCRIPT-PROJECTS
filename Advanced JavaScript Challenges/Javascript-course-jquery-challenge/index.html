<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div class="showAll initiallyHidden">
        <h1 class="heading">Heading!</h1>

        <p class="textChange">Paragraph!</p>

        <p id="stPara" class="initiallyHidden">Paragraph!</p>

        <p id="showPara" class="initiallyHidden">Shown Paragraph!</p>

        <ul>
            <li>List Item! First Child</li>
            <li id="fadeOut">List Item! Second Child</li>
        </ul>

        <p class="hoverOver">Hover over me!</p>

        <button class="headingButton">Click me to hide/show "Heading!"</button><br><br>

        <button class="paraButton">Click me to slide toggle "Paragraph!"</button>
        <button class="stopParaButton">Click me to stop the slide toggle animation, mid animation!</button><br><br>

        <button class="showParaButton">Click me to see "Shown Paragraph!"</button><br><br>

        <button class="ulButton">Click me to change the font size of the UL LI First Child"</button><br><br>

        <input type="text" value="Click on me and then click away to change the size of the font to 30px"
            style="width: 500px;"><br><br>

        <button class="fadeOutButton">Click me to Fade Out some text"</button><br><br>

        <button class="textChangeButton">CLick me to change the word Paragraph! to Woah!</button><br><br>
    </div>

    <button class="slideDownButton">Click me to see what's on this page</button>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
