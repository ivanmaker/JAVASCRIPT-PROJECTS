<!DOCTYPE html>
<html>
    <head>
        <title>Running JavaScript in the console</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <p id="globalVaribales" onclick="global()">Gobal - Click here</p>
        <p id="localVaribales" onclick="local()">Local - Click here</p>
        <hr>

        <p id="concat" onclick="concatenate()">Click here for a Concatenated sensence!</p>
        <hr>

        <button onclick="newCourse()">Click here for concatenated sensence</button>
        <p id="displayCourse"></p>
        <hr>

        <p id="displayAge"></p>
        <script>
            //a and b are global variables that can be edited in the console
            let a = 3;
            let b = 4;

            function global(){
                result = a + b;
                document.getElementById("globalVaribales").innerHTML = "Global variable a (" + a + ") plus global variable b (" + b + ") equals " + result;
            }

            function local(){
                let c = 4;
                let d = 3;
                result = c + d;
                document.getElementById("localVaribales").innerHTML = "Local variable c (" + c + ") plus local variable d (" + d + ") equals " + result;
            }

            let sentence1;
            let sentence2;

            function concatenate(){
                //Concatinate sentence1 and sentence2 using the .concat() method
                let concatSent = sentence1.concat(sentence2);

                //Display result on webpage
                document.getElementById("concat").innerHTML = concatSent;

                //Display result in console
                console.log(concatSent);
            }

            //Creates a course object constructor
            function Course(Name, Type, Duration){
                this.courseName = "Today's new course is: " + Name + "<br>";
                this.courseType = "Type: " + Type + "<br>";
                this.courseDur = "Course Length: " + Duration + " hours";
            }

            let js = new Course("JaveScript", "Code", 55);
            let py = new Course("Python", "Code", 90);

            //Get user input and calulate the age based on the year
            let year = prompt("Type in the year you were born");
            let yearNow = new Date().getFullYear();
            let age = Math.floor(yearNow - year);
        </script>
    </body>
</html>
