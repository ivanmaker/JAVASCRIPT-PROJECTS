<!DOCTYPE html>
<html>

<head>
    <title>Advanced JS Project2: Forms</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!--Form-->
    <form name="role-form" action="/action_page.php" onsubmit="return validify()" method="post">

        <!--Name-->
        <label class="name-label" for="name">Enter your Name</label>
        <input type="text" id="name" name="name"><br>

        <!--Class-->
        <p id="p-class-text">Choose your Class</p>
        <div class="class-choice">
            <input type="radio" id="theifClass" name="Class" value="Theif">
            <label for="theifClass">Theif</label><br>
            <input type="radio" id="mageClass" name="Class" value="Mage">
            <label for="mageClass">Mage</label><br>
            <input type="radio" id="archerClass" name="Class" value="Archer">
            <label for="archerClass">Archer</label>
        </div>
        <input type="submit" value="Submit your Character">
    </form>

    <script src="js/main.js"></script>
</body>

</html>
