<!DOCTYPE html>
<html>

<head>
    <Title>Project 5 Calculator</Title>
    <meta charset="UTF-8">
    <meta name="Descriptio" content="A Basic HTML, CSS, JavaScript Calculator">
    <meta name="Author" content="Isaac Vazquez">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <!--Link CSS File-->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg">
    <!--This is the main div container that will display the calculator-->
    <div class="calculator">
        <!--This input displays the result of the calculation-->
        <input type="text" class="calculator-screen" value="0" disabled>
        <!--This section displays all button that the user can press to make a calculation-->
        <div class="calculator-keys">

            <button type="button" class="operator" value="+">+</button>
            <button type="button" class="operator" value="-">-</button>
            <button type="button" class="operator" value="*">*</button>
            <button type="button" class="operator" value="/">/</button>

            <button type="button" class="number-button" value="7">7</button>
            <button type="button" class="number-button" value="8">8</button>
            <button type="button" class="number-button" value="9">9</button>

            <button type="button" class="number-button" value="4">4</button>
            <button type="button" class="number-button" value="5">5</button>
            <button type="button" class="number-button" value="6">6</button>

            <button type="button" class="number-button" value="1">1</button>
            <button type="button" class="number-button" value="2">2</button>
            <button type="button" class="number-button" value="3">3</button>

            <button type="button" value="0">0</button>
            <button type="button" class="decimal function" value=".">.</button>
            <button type="button" class="all-clear function" value="all-clear">AC</button>

            <button type="button" class="equal-sign operator" value="=">=</button>
        </div>
    </div>
    <!--Link JS File-->
    <script src="js/main.js"></script>
</body>

</html>
