<!DOCTYPE html>
<html>

<head>
    <title>Project3 Data Attributes</title>
    <meta charset="UTF-8">
</head>

<body>
    <h1>Characters!</h1>
    <h3>Click below to see what character is related to what attribute!</h3>

    <ul>
        <li onclick="displayCharacter(this)" id="theif" data-character-role="Theif">Sneaky</li>
        <li onclick="displayCharacter(this)" id="mage" data-character-role="Mage">Arcane</li>
        <li onclick="displayCharacter(this)" id="warrior" data-character-role="Warrior">Bold</li>
        <li onclick="displayCharacter(this)" id="archer" data-character-role="Archer">Aloof</li>
        <li onclick="displayCharacter(this)" id="tinkerer" data-character-role="Tinkerer">Crafty</li>
    </ul>

    <script src="js/main.js"></script>
</body>

</html>
