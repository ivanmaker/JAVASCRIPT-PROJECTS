<!DOCTYPE html>
<html>

<head>
    <title>Pizza Drill Demo</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg">
    <div id="menuBG">
        <h1>Pizza Drill Turtorial</h1>
        <input id="btnOrder" type="button" onclick="getReceipt()" value="Place Order">
        <form id="frmMenu">
            <div class="row">
                <div class="column">
                    <img src="images/pizza.png" class="pizza">
                    <img src="images/pizza.png" class="pizza">
                    <img src="images/pizza.png" class="pizza">
                </div>
                <div class="menu column">
                    <h3>Size:</h3>
                    <input class="size" type="radio" name="Size" value="Personl Pizza">Personal Pizza<br>
                    <input class="size" type="radio" name="Size" value="Medium Pizza">Medium Pizza<br>
                    <input class="size" type="radio" name="Size" value="Large Pizza">Large Pizza<br>
                    <input class="size" type="radio" name="Size" value="Extra Large Pizza">Extra Large Pizza<br>
                    <input class="size" type="radio" name="Size" value="XXL Pizza">XXL Pizza<br>

                    <h3>Vegies:</h3>
                    <input class="toppings" type="checkbox" name="Topping" value="Potato">Potato<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Chanterelle">Chanterelle<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Gilled Onion">Grilled Onion<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Pineapple">Pineapple<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Apseragus">Asperagus<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Fennel">Fennel<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Roasted Peppers">Roasted Peppers<br>

                    <h3>Meats:</h3>
                    <input class="toppings" type="checkbox" name="Topping" value="Pepperoni">Pepperoni<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Sausage">Sausage<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Canadian Bacon">Canadian Bacon<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Gorund Beef">Gorund Beef<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Anchovy">Anchovy<br>
                    <input class="toppings" type="checkbox" name="Topping" value="Chicken">Chicken<br>
                    <input class="toppings" type="checkbox" name="Topping" value="BBQ Chicken">BBQ Chicken<br>
                </div>
            </div>
            <div id="cart">
                <div id="showText"></div>
                <div id="totalPrice"></div>
            </div>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
